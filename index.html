<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>九巴到站時間</title>

<link rel="apple-touch-icon" href="BUS.jpg" />
<link rel="icon" href="BUS.jpg" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="九巴到站" />

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:system-ui,-apple-system,sans-serif;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const ETA_OFFSET_MIN = 2;

const PARTS = [
  { id:'YL292', name:'馬田壆出發', nameEn:'MA TIN POK', code:'YL292', stopId:'C187E3771B7032EC', color:'from-rose-500 to-pink-600',
    routes:[{route:'68E',dest:'青衣站'},{route:'68F',dest:'元朗公園(循環線)'}] },
  { id:'YL244', name:'YOHO MIX', nameEn:'YOHO MIX', code:'YL244', stopId:'21DA1E33BF580B96', color:'from-amber-500 to-orange-600',
    routes:[{route:'68E',dest:'元朗公園'},{route:'68F',dest:'元朗公園(循環線)'}] },
  { id:'YL242', name:'YOHO I', nameEn:'YOHO I', code:'YL242', stopId:'6A4B371546D489BF', color:'from-emerald-500 to-teal-600',
    routes:[{route:'68E',dest:'元朗公園'},{route:'68F',dest:'元朗公園(循環線)'}] },
  { id:'YL255', name:'康樂路', nameEn:'HONG LOK ROAD', code:'YL255', stopId:'8BE58FAD7E9C94C7', color:'from-sky-500 to-blue-600',
    routes:[{route:'E36',dest:'機場(地面運輸中心)'},{route:'E36S',dest:'機場(地面運輸中心)'},{route:'A36',dest:'機場(地面運輸中心)'}] },
  { id:'TY929', name:'青衣', nameEn:'TSING YI', code:'TY929', stopId:'83D9B6BE39530EEF', color:'from-violet-500 to-purple-600',
    routes:[{route:'68E',dest:'元朗公園'}] },
];

function minsFromNow(iso){ if(!iso)return null; const d=(new Date(iso).getTime()-Date.now())/60000; return Math.round(d)-ETA_OFFSET_MIN; }
function fmtTime(iso){ if(!iso)return '--:--'; return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
function normDest(s){ if(!s)return ''; return s.replace(/[()（）\s]/g,'').replace(/循環線/g,''); }

function EtaBadge({mins}){
  if(mins===null) return <span className="text-gray-400 text-sm">--</span>;
  if(mins<=0) return <span className="font-bold text-red-600">現已離開</span>;
  const cls = mins<=3?'text-red-600':mins<=8?'text-orange-600':'text-emerald-600';
  return <span className={`font-bold ${cls}`}>{mins} <span className="text-xs font-normal">分鐘</span></span>;
}

function PartCard({part}){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const [updated,setUpdated]=useState(null);

  const load=useCallback(async()=>{
    setLoading(true); setError(null);
    try{
      const res=await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${part.stopId}`);
      if(!res.ok) throw new Error('HTTP '+res.status);
      const json=await res.json();
      setData(json.data||[]); setUpdated(new Date());
    }catch(e){ setError('無法載入數據'); }
    finally{ setLoading(false); }
  },[part]);

  useEffect(()=>{ load(); const t=setInterval(load,30000); return()=>clearInterval(t); },[load]);

  return (
    <div className="bg-white rounded-2xl shadow-md overflow-hidden">
      <div className={`bg-gradient-to-r ${part.color} px-4 py-3 text-white`}>
        <div className="flex items-center justify-between">
          <div>
            <div className="font-bold text-lg leading-tight">📍 {part.name}</div>
            <div className="text-xs opacity-90">{part.nameEn} · {part.code}</div>
          </div>
          <button onClick={load} className="p-2 rounded-full hover:bg-white/20 transition text-xl">🔄</button>
        </div>
      </div>
      <div className="p-4 space-y-3">
        {error && <div className="text-red-500 text-sm bg-red-50 p-3 rounded-lg">⚠️ {error}</div>}
        {part.routes.map((r,idx)=>{
          const filtered=data.filter(d=>d.route===r.route && normDest(d.dest_tc)===normDest(r.dest))
            .sort((a,b)=>{const ta=a.eta?new Date(a.eta).getTime():Infinity;const tb=b.eta?new Date(b.eta).getTime():Infinity;return ta-tb;});
          const seen=new Set();
          const list=filtered.filter(d=>{const k=d.eta||'n'+Math.random();if(seen.has(k))return false;seen.add(k);return true;});
          return (
            <div key={idx} className="border border-gray-100 rounded-xl p-3">
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <div className="bg-gray-900 text-white font-bold px-2.5 py-1 rounded-lg">🚌 {r.route}</div>
                <span className="text-sm text-gray-500">往 {r.dest}</span>
              </div>
              {list.length===0 ? (
                <div className="text-sm text-gray-400 py-1">{loading?'載入中...':'暫無班次資料'}</div>
              ) : (
                <div className="space-y-1.5">
                  {list.slice(0,3).map((e,i)=>(
                    <div key={i} className="flex items-center justify-between text-sm">
                      <div className="flex items-center gap-2 text-gray-600">
                        🕐 <span>{fmtTime(e.eta)}</span>
                        {e.rmk_tc && <span className="text-xs text-gray-400">{e.rmk_tc}</span>}
                      </div>
                      <EtaBadge mins={minsFromNow(e.eta)} />
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })}
        {updated && <div className="text-xs text-gray-400 text-right pt-1">更新於 {updated.toLocaleTimeString('en-GB')}</div>}
      </div>
    </div>
  );
}

function App(){
  const [now,setNow]=useState(new Date());
  useEffect(()=>{ const t=setInterval(()=>setNow(new Date()),1000); return()=>clearInterval(t); },[]);
  return (
    <div className="min-h-screen bg-gray-100 pb-8">
      <div className="bg-gradient-to-r from-red-600 to-red-700 text-white px-4 py-5 shadow-lg sticky top-0 z-10">
        <div className="max-w-2xl mx-auto flex items-center justify-between">
          <h1 className="text-xl font-bold">🚌 九巴到站時間</h1>
          <div className="text-right">
            <div className="text-lg font-mono font-bold">{now.toLocaleTimeString('en-GB')}</div>
            <div className="text-xs opacity-80">每 30 秒自動更新</div>
          </div>
        </div>
      </div>
      <div className="max-w-2xl mx-auto px-4 pt-4 space-y-4">
        {PARTS.map(p=><PartCard key={p.id+p.stopId} part={p} />)}
        <div className="text-center text-xs text-gray-400 pt-2">數據來源:KMB / LWB 開放數據</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
